# Trigger Build: 2026-03-27 (Force clean dependency check)
[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."translate-subtitle"]
  timeout = 26

[functions."get-subtitle"]
  timeout = 15

[functions."yts-proxy"]
  timeout = 10

[[redirects]]
  from = "/api/yts-proxy"
  to = "/.netlify/functions/yts-proxy"
  status = 200

[[redirects]]
  from = "/api/translate-subtitle"
  to = "/.netlify/functions/translate-subtitle"
  status = 200

[[redirects]]
  from = "/api/get-subtitle"
  to = "/.netlify/functions/get-subtitle"
  status = 200
